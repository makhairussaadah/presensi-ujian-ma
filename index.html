<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presensi Ujian - Madrasah Aliyah Khairussa'adah Kubu</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  font-family: 'Segoe UI', sans-serif;
  margin:0;
  background:#f4f6f9;
}

header{
  background:#1e3a8a;
  color:white;
  padding:15px;
  text-align:center;
}

.container{
  padding:20px;
  max-width:1000px;
  margin:auto;
}

select,button{
  padding:10px;
  margin:5px 0;
  width:100%;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:14px;
}

button{
  background:#1e3a8a;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#162d6b;
}

#reader{
  margin-top:15px;
}

.dashboard{
  margin-top:15px;
  background:white;
  padding:15px;
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.modal{
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:400px;
  text-align:center;
  animation:pop 0.3s ease;
}

@keyframes pop{
  from{transform:scale(0.7); opacity:0;}
  to{transform:scale(1); opacity:1;}
}

.success{color:green; font-weight:bold;}
.error{color:red; font-weight:bold;}

footer{
  text-align:center;
  padding:10px;
  font-size:12px;
  color:#777;
}
</style>
</head>

<body>

<header>
<h2>Presensi Ujian</h2>
<h3>Madrasah Aliyah Khairussa'adah Kubu</h3>
</header>

<div class="container">

<select id="ruang">
<option value="">Pilih Ruang Ujian</option>
<option>Ruang 1</option>
<option>Ruang 2</option>
<option>Ruang 3</option>
</select>

<select id="mapel">
<option value="">Pilih Mata Pelajaran</option>
<option>BAHASA INGGRIS</option>
<option>PKN</option>
<option>MATEMATIKA</option>
<option>BAHASA INDONESIA</option>
<option>EKONOMI</option>
<option>FIKIH</option>
<option>BAHASA ARAB</option>
<option>AKIDAH AKHLAK</option>
<option>SEJARAH</option>
<option>QURAN HADIST</option>
<option>SKI</option>
<option>SOSIOLOGI</option>
<option>GEOGRAFI</option>
<option>PJOK</option>
<option>MULOK</option>
<option>INFORMATIKA</option>
<option>SBK</option>
<option>PRAKARYA</option>
</select>

<button onclick="startScan()">Mulai Scan</button>

<div id="reader"></div>

<div class="dashboard">
<h3>Dashboard Kehadiran</h3>
<p>Jumlah Hadir: <b id="totalHadir">0</b></p>
</div>

<button onclick="window.print()">Cetak Rekap</button>

</div>

<div class="modal" id="modal">
<div class="modal-content" id="modalContent">
</div>
</div>

<footer>
Sistem Presensi Ujian Digital
</footer>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbxUPtVHRbybU2VNlJ3vKQHVMncdtvR9NIxrysjQKsRW3zo71IVgFMpTePoEBvyAixW9yw/exec";

let html5QrCode;
let sudahScanPertama = false;

function bunyiBeep(){
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const oscillator = ctx.createOscillator();
  const gainNode = ctx.createGain();

  oscillator.connect(gainNode);
  gainNode.connect(ctx.destination);

  oscillator.type = "sine";
  oscillator.frequency.value = 1000;
  gainNode.gain.value = 1;

  oscillator.start();
  setTimeout(()=>{ oscillator.stop(); }, 150);
}

function tampilModal(html){
  document.getElementById("modalContent").innerHTML = html;
  document.getElementById("modal").style.display="flex";
}

function tutupModal(){
  document.getElementById("modal").style.display="none";
}

function updateDashboard(){
  const mapel = document.getElementById("mapel").value;
  fetch(scriptURL+"?action=dashboard&mapel="+mapel)
  .then(res=>res.json())
  .then(data=>{
    document.getElementById("totalHadir").innerText = data.total;
  });
}

function startScan(){

  const ruang = document.getElementById("ruang").value;
  const mapel = document.getElementById("mapel").value;

  if(!ruang || !mapel){
    alert("Pilih ruang dan mata pelajaran terlebih dahulu");
    return;
  }

  if(!sudahScanPertama){
    document.getElementById("mapel").disabled = true;
    sudahScanPertama = true;
  }

  html5QrCode = new Html5Qrcode("reader");
  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    qrCodeMessage => {

      html5QrCode.stop();

      fetch(scriptURL, {
        method: "POST",
        body: JSON.stringify({
          barcode: qrCodeMessage,
          mapel: mapel,
          ruang: ruang
        })
      })
      .then(res=>res.json())
      .then(res=>{

        if(res.status=="success"){
          bunyiBeep();
          tampilModal(`
            <h3 class="success">ABSENSI BERHASIL</h3>
            <p><b>${res.nama}</b></p>
            <p>${res.nomor}</p>
            <p>${res.kelas}</p>
            <button onclick="tutupModal(); startScan();">Scan Lagi</button>
          `);
          updateDashboard();
        }else{
          tampilModal(`
            <h3 class="error">${res.message}</h3>
            <button onclick="tutupModal(); startScan();">OK</button>
          `);
        }

      });

    }
  );
}

</script>

</body>
</html>
