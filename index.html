<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presensi Ujian - MTS Khairussa'adah Kubu</title>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#eef7f1;
}

header{
  background:linear-gradient(135deg,#15803d,#22c55e);
  color:white;
  padding:20px;
  text-align:center;
}

.container{
  padding:20px;
  max-width:500px;
  margin:auto;
}

.card{
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
  margin-bottom:20px;
}

select,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ddd;
}

button{
  background:#15803d;
  color:white;
  border:none;
  font-weight:bold;
}

button:hover{
  background:#166534;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  padding:20px;
  border-radius:15px;
  width:90%;
  max-width:350px;
  text-align:center;
}
.success{color:#16a34a;}
.error{color:#dc2626;}
</style>
</head>

<body>

<header>
<h2>Presensi Ujian</h2>
<p>MTS Khairussa'adah Kubu</p>
</header>

<div class="container">

<div class="card">
<select id="ruang">
<option value="">Pilih Ruang</option>
<option>Ruang 1</option>
<option>Ruang 2</option>
</select>

<select id="mapel">
<option value="">Pilih Mata Pelajaran</option>
<option>BAHASA INGGRIS</option>
<option>PKN</option>
<option>MATEMATIKA</option>
<option>BAHASA INDONESIA</option>
<option>IPS</option>
<option>FIKIH</option>
<option>BAHASA ARAB</option>
<option>AKIDAH AKHLAK</option>
<option>IPA</option>
<option>QURAN HADIST</option>
<option>SKI</option>
<option>PJOK</option>
<option>MULOK</option>
<option>INFORMATIKA</option>
<option>SBK</option>
<option>PRAKARYA</option>
</select>

<button onclick="startScan()">Mulai Scan</button>
<div id="reader"></div>

<button onclick="downloadRekap()">Download Rekap Hari Ini</button>

</div>
</div>

<div class="modal" id="modal">
<div class="modal-content" id="modalContent"></div>
</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycby_rM999Ui-lpPk0uxma5Lw-fe4GtSTxT67xHaDsSHxRuo0HsKGVYdxZF_qLz5CKSOF9A/exec";
let html5QrCode;
let scannedCache=new Set();

function beep(){
  const ctx=new(window.AudioContext||window.webkitAudioContext)();
  const osc=ctx.createOscillator();
  osc.connect(ctx.destination);
  osc.frequency.value=1200;
  osc.start();
  setTimeout(()=>osc.stop(),120);
}

function modal(html){
  document.getElementById("modalContent").innerHTML=html;
  document.getElementById("modal").style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

function startScan(){

  const ruang=document.getElementById("ruang").value;
  const mapel=document.getElementById("mapel").value;

  if(!ruang||!mapel){
    alert("Pilih ruang dan mapel dulu");
    return;
  }

  html5QrCode=new Html5Qrcode("reader");

  html5QrCode.start(
    {facingMode:"environment"},
    {fps:20,qrbox:250},
    qr=>{
      html5QrCode.stop();

      if(scannedCache.has(qr)){
        modal(`<h3 class="error">Sudah Discann</h3>
        <button onclick="closeModal();startScan()">OK</button>`);
        return;
      }

      fetch(scriptURL,{
        method:"POST",
        body:JSON.stringify({
          nomor:qr,
          mapel:mapel,
          ruang:ruang
        })
      })
      .then(r=>r.json())
      .then(res=>{

        if(res.status==="success"){
          scannedCache.add(qr);
          beep();
          modal(`
          <h3 class="success">Berhasil</h3>
          <p><b>${res.nama}</b></p>
          <p>${res.nomor}</p>
          <p>${res.kelas}</p>
          <button onclick="closeModal();startScan()">Scan Lagi</button>
          `);
        }else{
          modal(`
          <h3 class="error">${res.status}</h3>
          <button onclick="closeModal();startScan()">OK</button>
          `);
        }

      });

    }
  );
}

function downloadRekap(){
  const mapel=document.getElementById("mapel").value;
  if(!mapel){alert("Pilih mapel dulu");return;}

  fetch(scriptURL+"?mode=download&mapel="+mapel)
  .then(r=>r.json())
  .then(res=>{
    if(res.status==="success"){
      let csv="Tanggal,Timestamp,Nomor,Nama,Kelas,Ruang,Status\n";
      res.data.forEach(r=>{
        csv+=r.join(",")+"\n";
      });

      const blob=new Blob([csv],{type:"text/csv"});
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");
      a.href=url;
      a.download="Rekap_"+mapel+".csv";
      a.click();
    }
  });
}

</script>

</body>
</html>
