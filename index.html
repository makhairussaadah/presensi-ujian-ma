<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presensi Ujian - Madrasah Aliyah Khairussa'adah Kubu</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#eef7f1;
}

header{
  background:linear-gradient(135deg,#15803d,#22c55e);
  color:white;
  padding:20px;
  text-align:center;
  box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

header h2{margin:0;}
header p{margin:5px 0 0;font-size:14px;}

.container{
  padding:20px;
  max-width:600px;
  margin:auto;
}

.card{
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
  margin-bottom:20px;
}

select,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:14px;
}

button{
  background:#15803d;
  color:white;
  border:none;
  font-weight:bold;
}

button:hover{
  background:#166534;
}

#reader{
  margin-top:15px;
}

.dashboard{
  text-align:center;
  font-size:18px;
  font-weight:bold;
  color:#15803d;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  padding:25px;
  border-radius:15px;
  width:90%;
  max-width:350px;
  text-align:center;
  animation:pop 0.2s ease;
}

@keyframes pop{
  from{transform:scale(.8);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

.success{color:#16a34a;}
.error{color:#dc2626;}

</style>
</head>

<body>

<header>
<h2>Presensi Ujian</h2>
<p>Madrasah Aliyah Khairussa'adah Kubu</p>
</header>

<div class="container">

<div class="card">
<select id="ruang">
<option value="">Pilih Ruang</option>
<option>Ruang 1</option>
<option>Ruang 2</option>
<option>Ruang 3</option>
</select>

<select id="mapel">
<option value="">Pilih Mata Pelajaran</option>
<option>BAHASA INGGRIS</option>
<option>PKN</option>
<option>MATEMATIKA</option>
<option>BAHASA INDONESIA</option>
<option>EKONOMI</option>
<option>FIKIH</option>
<option>BAHASA ARAB</option>
<option>AKIDAH AKHLAK</option>
<option>SEJARAH</option>
<option>QURAN HADIST</option>
<option>SKI</option>
<option>SOSIOLOGI</option>
<option>GEOGRAFI</option>
<option>PJOK</option>
<option>MULOK</option>
<option>INFORMATIKA</option>
<option>SBK</option>
<option>PRAKARYA</option>
</select>

<button onclick="startScan()">Mulai Scan</button>

<div id="reader"></div>
</div>

<div class="card dashboard">
Jumlah Hadir Hari Ini:
<div id="totalHadir">0</div>
</div>

</div>

<div class="modal" id="modal">
<div class="modal-content" id="modalContent"></div>
</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbx7OvskHmTlDxHRDq3v7nL2Wl7OGrSTvql9n8MU8YG2K0xYDtvlnYVC0xMwcyV16lbzYA/exec";

let html5QrCode;
let sudahScanPertama=false;

function bunyiBeep(){
  const ctx=new(window.AudioContext||window.webkitAudioContext)();
  const osc=ctx.createOscillator();
  const gain=ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.frequency.value=1200;
  gain.gain.value=1;
  osc.start();
  setTimeout(()=>osc.stop(),150);
}

function tampilModal(html){
  document.getElementById("modalContent").innerHTML=html;
  document.getElementById("modal").style.display="flex";
}

function tutupModal(){
  document.getElementById("modal").style.display="none";
}

function updateDashboard(){
  const mapel=document.getElementById("mapel").value;
  fetch(scriptURL+"?mode=rekapRuang&mapel="+mapel)
  .then(res=>res.json())
  .then(data=>{
    document.getElementById("totalHadir").innerText=data.total||0;
  });
}

function startScan(){

  const ruang=document.getElementById("ruang").value;
  const mapel=document.getElementById("mapel").value;

  if(!ruang||!mapel){
    alert("Pilih ruang dan mata pelajaran dulu");
    return;
  }

  if(!sudahScanPertama){
    document.getElementById("mapel").disabled=true;
    sudahScanPertama=true;
  }

  html5QrCode=new Html5Qrcode("reader");

  html5QrCode.start(
    {facingMode:"environment"},
    {fps:15,qrbox:250},
    qrCodeMessage=>{

      html5QrCode.stop();

      fetch(scriptURL,{
        method:"POST",
        body:JSON.stringify({
          nomor:qrCodeMessage,
          mapel:mapel,
          ruang:ruang
        })
      })
      .then(res=>res.json())
      .then(res=>{

        if(res.status==="success"){
          bunyiBeep();
          tampilModal(`
            <h3 class="success">ABSENSI BERHASIL</h3>
            <p><b>${res.nama}</b></p>
            <p>${res.nomor}</p>
            <p>${res.kelas}</p>
            <button onclick="tutupModal();startScan()">Scan Lagi</button>
          `);
          updateDashboard();
        }else{
          tampilModal(`
            <h3 class="error">ABSENSI GAGAL</h3>
            <p>${res.status}</p>
            <button onclick="tutupModal();startScan()">OK</button>
          `);
        }

      });

    }
  );
}

</script>

</body>
</html>
